image: node:20-alpine

stages:
  - setup
  - lint
  - build
  - test

variables:
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm
    - node_modules/

install_dependencies:
  stage: setup
  script:
    - npm ci --prefer-offline

lint_code:
  stage: lint
  script:
    - npm run lint || echo "Linting no configurado estrictamente aún"
  dependencies:
    - install_dependencies

build_portfolio:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  dependencies:
    - install_dependencies

run_tests:
  stage: test
  script:
    - echo "Ejecutando suite de pruebas e2e y unitarias..."
    - npm run test || echo "Tests pendientes de implementación formal"
  dependencies:
    - build_portfolio
